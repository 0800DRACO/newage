name: newage
services:
- name: web
  github:
    branch: main
    repo: 0800DRACO/newage
  build_command: ""
  dockerfile_path: Dockerfile
  envs:
  - key: APP_ENV
    value: production
    scope: RUN_AND_BUILD_TIME
  - key: APP_DEBUG
    value: "false"
    scope: RUN_AND_BUILD_TIME
  http_port: 9000
  health_check:
    http_path: /up
  http_routes:
  - path: /
  instance_count: 1
  instance_size_slug: basic-xs
  log_formats:
    http_format: $remote_addr - $http_user_agent [$time_iso8601] "$method $uri" $status $sent_bytes
  max_client_body_size: 100
  source_dir: /
databases:
- name: db
  engine: MYSQL
  version: "8"
  production: true
  db_name: realvest_db
  db_user: realvest_user
static_sites: []
jobs: []
