name: newage
services:
- name: app
  github:
    branch: main
    deploy_on_push: true
    repo: 0800DRACO/newage
  build_command: ""
  dockerfile_path: Dockerfile
  http_port: 8080
  health_check:
    http_path: /health.php
    initial_delay_seconds: 30
    timeout_seconds: 10
    period_seconds: 10
  envs:
  - key: APP_ENV
    value: production
    scope: RUN_AND_BUILD_TIME
  - key: APP_DEBUG
    value: "false"
    scope: RUN_AND_BUILD_TIME
  - key: LOG_CHANNEL
    value: stderr
    scope: RUN_AND_BUILD_TIME
  - key: COMPOSER_ALLOW_SUPERUSER
    value: "1"
    scope: BUILD_TIME
  - key: DB_DRIVER
    value: mysql
    scope: RUN_TIME
  envs_from:
  - environment_slug: newage-env
engines:
  node: null
jobs: null
